  <title>Flashcards Árabe – Adjetivos</title>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #e8e0d0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 48px;
    }

    h1 {
      font-family: Arial, sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #f0c070;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 300;
      color: #8a8090;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 32px;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 28px;
      border-radius: 30px;
      border: 1px solid #3a3050;
      background: transparent;
      color: #e8e0d0;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s;
    }

    .btn:hover { background: #2a2045; border-color: #f0c070; color: #f0c070; }
    .btn:active { transform: scale(0.97); }
    .btn.active { background: #f0c070; color: #1a1a2e; border-color: #f0c070; }

    .card-container {
      perspective: 1200px;
      width: 100%;
      max-width: 700px;
      height: 340px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(.4,0,.2,1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .side {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 36px;
      text-align: center;
      gap: 16px;
    }

    .front { background: #12122a; border: 1px solid #2e2850; }
    .back  { transform: rotateY(180deg); background: #1e1840; border: 1px solid #f0c070; }

    .arabic-word {
      font-family: Arial, sans-serif;
      font-size: 64px;
      direction: rtl;
      color: #f0c070;
      line-height: 1.2;
    }

    .hint { font-size: 12px; color: #4a4060; letter-spacing: 2px; text-transform: uppercase; }

    .roman {
      font-size: 22px;
      font-style: italic;
      color: #a090c0;
      font-weight: 300;
    }

    .meaning-es {
      font-size: 28px;
      font-weight: 700;
      color: #e8e0d0;
    }

    .arabic-back {
      font-family: Arial, sans-serif;
      font-size: 36px;
      direction: rtl;
      color: #f0c070;
      line-height: 1.2;
    }

    .help {
      margin-top: 24px;
      font-size: 11px;
      color: #3a3050;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
    }

    @media (max-width: 500px) {
      .arabic-word { font-size: 46px; }
      .arabic-back { font-size: 26px; }
      .card-container { height: 300px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <h1>ADJETIVOS · الصفات</h1>
  <div class="subtitle">aṣ-ṣifāt · Flashcards árabe</div>

  <div class="controls">
    <button class="btn" onclick="prevCard()">⬅ Anterior</button>
    <button class="btn" onclick="flipCard()">🔄 Girar</button>
    <button class="btn" onclick="nextCard()">Siguiente ➡</button>
    <button class="btn" id="randomBtn" onclick="toggleRandom()">🔀 Aleatorio: NO</button>
    <button class="btn" onclick="shuffleCards()">⇄ Mezclar</button>
  </div>

  <div class="card-container">
    <div class="card" id="card" onclick="flipCard()">
      <div class="side front" id="front"></div>
      <div class="side back"  id="back"></div>
    </div>
  </div>

    function renderCard() {
      const c = cards[current];
      card.classList.remove('flipped');

      frontEl.innerHTML = `
        <div class="arabic-word">${c.ar}</div>
        <div class="hint">toca para ver la traducción</div>
      `;

      backEl.innerHTML = `
        <div class="arabic-back">${c.ar}</div>
        <div class="roman">${c.ro}</div>
        <div class="meaning-es">${c.es}</div>
      `;
    }

    function flipCard() { card.classList.toggle('flipped'); }

    function nextCard() {
      current = randomMode
        ? Math.floor(Math.random() * cards.length)
        : (current + 1) % cards.length;
      renderCard();
    }

    function prevCard() {
      current = randomMode
        ? Math.floor(Math.random() * cards.length)
        : (current - 1 + cards.length) % cards.length;
      renderCard();
    }

    function toggleRandom() {
      randomMode = !randomMode;
      randomBtn.textContent = `🔀 Aleatorio: ${randomMode ? 'SÍ' : 'NO'}`;
      randomBtn.classList.toggle('active', randomMode);
    }

    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      current = 0;
      renderCard();
    }

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); flipCard(); }
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === 'ArrowLeft') prevCard();
    });

    renderCard();
  </script>

</body>
</html>
